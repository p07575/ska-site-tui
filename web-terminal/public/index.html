<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>jx-blog</title>
    <link rel="stylesheet" href="/vendor/xterm.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
      }
      #terminal {
        position: fixed;
        inset: 0;
        padding: 6px;
      }
      /* xterm sizes itself; keep it filling the padded box */
      .xterm,
      .xterm-viewport,
      .xterm-screen {
        height: 100% !important;
      }
      .xterm-viewport::-webkit-scrollbar {
        width: 8px;
      }
      .xterm-viewport::-webkit-scrollbar-thumb {
        background: #3c3c3c;
      }
    </style>
  </head>
  <body>
    <div id="terminal"></div>
    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/term.js"></script>
  </body>
</html>
